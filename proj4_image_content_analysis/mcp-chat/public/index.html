<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coco Chat</title>
    <style>
        /* ChatGPT-like Interface Styles */
        :root {
            --bg-primary: #343541;
            --bg-secondary: #40414f;
            --bg-tertiary: #202123;
            --text-primary: #ececf1;
            --text-secondary: #c5c5d2;
            --accent: #10a37f;
            --accent-hover: #0e9380;
            --border: #565869;
            --user-bg: #343541;
            --assistant-bg: #444654;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Layout */
        .new-chat-btn.sidebar-btn {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .new-chat-btn.sidebar-btn:hover {
            background-color: var(--accent-hover);
        }

        .conversations-header {
            padding: 8px 16px 4px 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .conversations-header h4 {
            margin: 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 2px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 1px solid transparent;
        }

        .conversation-item:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--border);
        }

        .conversation-item.active {
            background-color: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .conversation-title {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-right: 8px;
        }

        .conversation-delete {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .conversation-item:hover .conversation-delete {
            opacity: 1;
        }

        .conversation-delete:hover {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
        }

        .model-section {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .model-selector-header h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-model-selector select {
            width: 100%;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c5c5d2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .sidebar-model-selector select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1);
        }

        .sidebar-model-selector select:hover {
            border-color: var(--text-secondary);
        }

        .sidebar-model-selector option {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            padding: 8px;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background-color: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--text-secondary);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 2px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
        }

        .chat-item:hover {
            background-color: var(--bg-tertiary);
        }

        .chat-item.active {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--accent);
        }

        .chat-title {
            flex: 1;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-primary);
        }

        /* Welcome Screen */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .welcome h1 {
            font-size: 32px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .welcome p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-height: calc(100vh - 120px);
        }

        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            display: flex;
            justify-content: flex-end;
        }

        .message.assistant {
            display: flex;
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
        }

        .message.user .message-content {
            background-color: var(--user-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .message.assistant .message-content {
            background-color: var(--assistant-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.4;
                transform: scale(0.8);
            }
            30% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background-color: var(--bg-primary);
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-container textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 20px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-container textarea:focus {
            border-color: var(--accent);
        }

        .send-btn {
            padding: 12px 20px;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            min-width: 80px;
        }

        .send-btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }


        .saved-conversation {
            opacity: 0.8;
        }

        .saved-conversation:hover {
            opacity: 1;
            background-color: var(--bg-tertiary);
        }

        .saved-conversation.active {
            opacity: 1;
            background-color: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
        }


        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                z-index: 10;
                transform: translateX(-100%);
            }

            .main-chat {
                width: 100%;
            }

            .message-content {
                max-width: 90%;
            }
        }

        /* Scrollbar Styling */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Toast notifications */
        .toast {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        .toast-success {
            background-color: #10a37f !important;
        }

        .toast-error {
            background-color: #ef4444 !important;
        }

        .toast-warning {
            background-color: #f59e0b !important;
        }

        .toast-info {
            background-color: #3b82f6 !important;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewChat()">New Chat</button>
            </div>
            <div class="chat-list" id="chatList">
                <!-- Chat items will be added here -->
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="welcome" id="welcome">
                <h1>Welcome to Coco Chat</h1>
                <p>Start a new conversation with the AI</p>
                <button class="new-chat-btn large" onclick="createNewChat()">Start New Chat</button>
            </div>

            <div class="messages" id="messages" style="display: none;">
                <!-- Messages will be added here -->
            </div>

            <!-- Input Area -->
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-container">
                    <textarea
                        id="messageInput"
                        placeholder="Type your message here..."
                        rows="1"
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeChat = null;
        let isLoading = false;
        let conversations = [];
        let currentModel = 'grok-4-fast';
        let currentModel = 'grok-4-fast';

        function createNewChat() {
            // Create a fresh new chat
            const newChat = {
                id: Date.now(),
                title: "New Chat",
                messages: [], // Always start with empty messages
                createdAt: new Date()
            };

            activeChat = newChat;
            renderMessages();
            showChatInterface();
        }

        function renderChatList() {
            renderSidebar();
        }

        function renderMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';

            if (!activeChat) return;

            // Display model info at the top of the chat
            const modelInfo = document.createElement('div');
            modelInfo.className = 'model-info';
            modelInfo.innerHTML = `
                <div style="text-align: center; padding: 10px; color: var(--text-secondary); font-size: 12px; border-bottom: 1px solid var(--border); margin-bottom: 20px;">
                    ${getModelEmoji(activeChat.model)} ${getModelDisplayName(activeChat.model)}
                </div>
            `;
            messagesDiv.appendChild(modelInfo);

            activeChat.messages.forEach(message => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${message.role}`;

                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                messageContent.textContent = message.content;

                messageDiv.appendChild(messageContent);
                messagesDiv.appendChild(messageDiv);
            });

            if (isLoading) {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message assistant';

                const typingContent = document.createElement('div');
                typingContent.className = 'message-content typing';

                const typingIndicator = document.createElement('div');
                typingIndicator.className = 'typing-indicator';
                typingIndicator.innerHTML = '<span></span><span></span><span></span>';

                typingContent.appendChild(typingIndicator);
                typingDiv.appendChild(typingContent);
                messagesDiv.appendChild(typingDiv);
            }

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showChatInterface() {
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('messages').style.display = 'block';
            document.getElementById('inputArea').style.display = 'block';
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');

            if (!input.value.trim() || isLoading) return;

            const userMessage = { role: "user", content: input.value.trim() };

            if (!activeChat) {
                await createNewChat();
            }

            activeChat.messages.push(userMessage);
            input.value = '';
            isLoading = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '...';

            renderMessages();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: activeChat.messages,
                        model: currentModel
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                let assistantMessage;
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    assistantMessage = data.choices[0].message;
                } else if (data.content) {
                    assistantMessage = { role: "assistant", content: data.content };
                } else {
                    throw new Error("Unexpected response format from server");
                }

                activeChat.messages.push(assistantMessage);
                activeChat.updatedAt = new Date().toISOString();

                renderMessages();

                // Auto-save conversation
                autoSaveConversation();

            } catch (error) {
                console.error("Error sending message:", error);
                const errorMessage = {
                    role: "assistant",
                    content: `Sorry, there was an error: ${error.message}. Please check that the backend server is running.`
                };
                activeChat.messages.push(errorMessage);
                renderMessages();
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }






        // Show toast notification
        function showToast(message, type = 'info') {
            // Remove existing toast
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            // Create new toast
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;

            // Style the toast
            Object.assign(toast.style, {
                position: 'fixed',
                top: '20px',
                right: '20px',
                padding: '12px 20px',
                borderRadius: '8px',
                color: 'white',
                fontSize: '14px',
                fontWeight: '500',
                zIndex: '1000',
                opacity: '0',
                transform: 'translateY(-20px)',
                transition: 'all 0.3s ease',
                boxShadow: '0 4px 12px rgba(0, 0, 0, 0.3)'
            });

            // Set background color based on type
            const colors = {
                success: '#10a37f',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#3b82f6'
            };
            toast.style.backgroundColor = colors[type] || colors.info;

            document.body.appendChild(toast);

            // Animate in
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            }, 10);

            // Auto remove after 3 seconds
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Render sidebar with conversations and model selector
        function renderSidebar() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = '';

            // Add New Chat button
            const newChatBtn = document.createElement('button');
            newChatBtn.className = 'new-chat-btn sidebar-btn';
            newChatBtn.innerHTML = '➕ New Chat';
            newChatBtn.onclick = () => createNewChat();
            chatList.appendChild(newChatBtn);

            // Add conversations section
            if (conversations.length > 0) {
                const conversationsHeader = document.createElement('div');
                conversationsHeader.className = 'conversations-header';
                conversationsHeader.innerHTML = '<h4>💬 Conversations</h4>';
                chatList.appendChild(conversationsHeader);

                conversations.forEach(conversation => {
                    const conversationItem = document.createElement('div');
                    conversationItem.className = `conversation-item ${activeChat && activeChat.id === conversation.id ? 'active' : ''}`;
                    conversationItem.onclick = () => loadConversation(conversation.id);

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'conversation-title';
                    titleDiv.textContent = conversation.title;

                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'conversation-meta';
                    const modelEmoji = getModelEmoji(conversation.model);
                    metaDiv.textContent = `${modelEmoji} ${conversation.messageCount} msgs`;

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'conversation-delete';
                    deleteBtn.innerHTML = '🗑️';
                    deleteBtn.title = 'Delete conversation';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteConversation(conversation.id);
                    };

                    conversationItem.appendChild(titleDiv);
                    conversationItem.appendChild(metaDiv);
                    conversationItem.appendChild(deleteBtn);
                    chatList.appendChild(conversationItem);
                });
            }

            // Add model selector at bottom
            const modelSection = document.createElement('div');
            modelSection.className = 'model-section';

            const modelHeader = document.createElement('div');
            modelHeader.className = 'model-selector-header';
            modelHeader.innerHTML = '<h4>🤖 Model</h4>';
            modelSection.appendChild(modelHeader);

            const selectorContainer = document.createElement('div');
            selectorContainer.className = 'sidebar-model-selector';

            const select = document.createElement('select');
            select.id = 'sidebarModelSelect';
            select.onchange = (e) => changeModel(e.target.value);

            selectorContainer.appendChild(select);
            modelSection.appendChild(selectorContainer);
            chatList.appendChild(modelSection);

            // Load models into the selector
            loadModelsForSelector();
        }

        // Load conversations from server
        async function loadConversations() {
            try {
                const response = await fetch('/conversations');
                if (response.ok) {
                    conversations = await response.json();
                    renderSidebar();
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        // Create new chat
        async function createNewChat() {
            // Save current chat if it has messages
            if (activeChat && activeChat.messages && activeChat.messages.length > 0) {
                await saveCurrentConversation();
            }

            // Create fresh new chat
            activeChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: [],
                model: currentModel,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            renderMessages();
            showChatInterface();
            renderSidebar();
        }

        // Load conversation
        async function loadConversation(id) {
            try {
                // Save current chat first
                if (activeChat && activeChat.messages && activeChat.messages.length > 0) {
                    await saveCurrentConversation();
                }

                const response = await fetch(`/conversations/${id}`);
                if (response.ok) {
                    activeChat = await response.json();
                    currentModel = activeChat.model || 'grok-4-fast';
                    renderMessages();
                    showChatInterface();
                    renderSidebar();
                    showToast('Conversation loaded', 'success');
                } else {
                    showToast('Failed to load conversation', 'error');
                }
            } catch (error) {
                console.error('Error loading conversation:', error);
                showToast('Error loading conversation', 'error');
            }
        }

        // Save current conversation
        async function saveCurrentConversation() {
            if (!activeChat || !activeChat.messages || activeChat.messages.length === 0) {
                return;
            }

            try {
                // Generate title from first message if it's still "New Chat"
                if (activeChat.title === 'New Chat' && activeChat.messages.length > 0) {
                    const firstMessage = activeChat.messages.find(m => m.role === 'user');
                    if (firstMessage) {
                        activeChat.title = firstMessage.content.slice(0, 50) +
                            (firstMessage.content.length > 50 ? '...' : '');
                    }
                }

                activeChat.updatedAt = new Date().toISOString();

                const response = await fetch('/conversations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: activeChat.id,
                        title: activeChat.title,
                        messages: activeChat.messages,
                        model: currentModel
                    })
                });

                if (response.ok) {
                    console.log('Conversation saved');
                    loadConversations(); // Refresh the sidebar
                }
            } catch (error) {
                console.error('Error saving conversation:', error);
            }
        }

        // Delete conversation
        async function deleteConversation(id) {
            if (!confirm('Are you sure you want to delete this conversation?')) {
                return;
            }

            try {
                const response = await fetch(`/conversations/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Remove from conversations array
                    conversations = conversations.filter(conv => conv.id !== id);

                    // If this was the active conversation, create a new one
                    if (activeChat && activeChat.id === id) {
                        await createNewChat();
                    } else {
                        renderSidebar();
                    }

                    showToast('Conversation deleted', 'success');
                } else {
                    showToast('Failed to delete conversation', 'error');
                }
            } catch (error) {
                console.error('Error deleting conversation:', error);
                showToast('Error deleting conversation', 'error');
            }
        }

        // Auto-save conversation after each message
        async function autoSaveConversation() {
            if (activeChat && activeChat.messages && activeChat.messages.length > 0) {
                await saveCurrentConversation();
            }
        }

        // Get model emoji for display
        function getModelEmoji(model) {
            const emojis = {
                'grok-4-fast': '🚀',
                'supermind-agent-v1': '🧠',
                'gemini-2.5-pro': '💎',
                'gemini-3-flash-preview': '⚡',
                'gpt-5': '🔬',
                'deepseek': '💰'
            };
            return emojis[model] || '🤖';
        }

        // Load models specifically for the sidebar selector
        async function loadModelsForSelector() {
            const fallbackModels = [
                { id: 'grok-4-fast' },
                { id: 'supermind-agent-v1' },
                { id: 'gemini-2.5-pro' },
                { id: 'gemini-3-flash-preview' },
                { id: 'gpt-5' },
                { id: 'deepseek' }
            ];

            try {
                const response = await fetch('/models');
                if (response.ok) {
                    const data = await response.json();
                    console.log('API Models loaded for selector:', data.data);
                    populateSidebarSelector(data.data || fallbackModels);
                } else {
                    console.log('API returned error, using fallback models for selector');
                    populateSidebarSelector(fallbackModels);
                }
            } catch (error) {
                console.log('Error loading models from API for selector, using fallback:', error.message);
                populateSidebarSelector(fallbackModels);
            }
        }

        // Populate sidebar model selector
        function populateSidebarSelector(models) {
            const select = document.getElementById('sidebarModelSelect');
            if (!select) return;

            // Clear existing options
            select.innerHTML = '';

            // Add models
            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model.id;
                option.textContent = getModelDisplayName(model.id);
                select.appendChild(option);
            });

            // Set current model
            select.value = currentModel;

            console.log(`Sidebar selector populated with ${models.length} models`);
        }

        // Change model
        function changeModel(model) {
            currentModel = model;
            showToast(`Switched to ${getModelDisplayName(model)}`, 'success');
        }

        // Get display name for model
        function getModelDisplayName(model) {
            const names = {
                'grok-4-fast': 'Grok-4-Fast',
                'supermind-agent-v1': '🚀 Supermind Agent v1',
                'gemini-2.5-pro': 'Gemini 2.5 Pro',
                'gemini-3-flash-preview': 'Gemini 3 Flash',
                'gpt-5': 'GPT-5',
                'deepseek': 'DeepSeek'
            };
            return names[model] || model;
        }

        // Initialize
        loadConversations();
    </script>
</body>
</html>
